# Smoke tests: no local MySQL/Redis/API key required (use dev profile + docker compose for integration)
werewolf.ai.enabled=false
werewolf.gateway.phase-tick-enabled=false
werewolf.game.phase-countdown-enabled=false
werewolf.persistence.mysql-room=false
werewolf.persistence.game-archive=false
werewolf.persistence.redis-session=false
spring.autoconfigure.exclude=\
  org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,\
  org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration,\
  org.springframework.boot.data.redis.autoconfigure.RedisAutoConfiguration,\
  dev.langchain4j.spring.LangChain4jAutoConfiguration,\
  dev.langchain4j.openai.spring.OpenAiAutoConfiguration
