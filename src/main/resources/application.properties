spring.application.name=werewolf-engine

# Profile: Windows 用户/系统环境变量 SPRING_PROFILES_ACTIVE（未设置时默认 dev）
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# LLM: Windows 用户/系统环境变量 DEEPSEEK_API_KEY（dev profile 中引用）
# 一次性写入: .\scripts\set-dev-env.ps1 -ApiKey "sk-..."

# Java 21 virtual threads: use platform thread pool sparingly on blocking I/O (HTTP, JDBC, LLM calls).
# Does not replace event-driven timers; game phase scheduling should still use @Scheduled / delayed tasks, not busy-spin.
spring.threads.virtual.enabled=true

# Gateway phase tick (Formal path B — ADR-005 P-04)
werewolf.gateway.phase-tick-enabled=true
werewolf.gateway.phase-tick-interval-ms=1500

# Authoritative PHASE_SYNC.countdown (ADR-005 P-05)
werewolf.game.phase-countdown-enabled=true
