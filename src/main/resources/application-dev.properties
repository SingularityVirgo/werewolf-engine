# Dev profile: docker compose up -d
# DEEPSEEK_API_KEY / SPRING_PROFILES_ACTIVE 浠?Windows 鐜鍙橀噺璇诲彇锛堣 scripts/dev/set-dev-env.ps1锛?
spring.datasource.url=jdbc:mysql://localhost:3306/werewolf?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=werewolf
spring.datasource.password=werewolf
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

werewolf.persistence.mysql-room=true
werewolf.persistence.game-archive=true
werewolf.persistence.redis-session=true
werewolf.persistence.dev-user-seed=true
werewolf.auth.token-ttl-days=30

# Formal phase-tick/load scripts: no wall-clock countdown waits in local dev
werewolf.game.phase-countdown-enabled=false
# Formal scripts drive ticks via HTTP; avoid racing the background scheduler
werewolf.gateway.phase-tick-enabled=false

spring.data.redis.host=localhost
spring.data.redis.port=6379

# LangChain4j 鈥?DeepSeek 瀹樻柟 OpenAI 鍏煎 API锛坉ev/prod 鍚屽巶鍟嗗悓妯″瀷锛屼笉缁忓崈闂?鐧剧偧锛?# 妯″瀷锛歞eepseek-v4-flash锛堜綆寤惰繜锛墊 鏇村己鎺ㄧ悊鍙敼 deepseek-v4-pro
langchain4j.open-ai.chat-model.api-key=${DEEPSEEK_API_KEY:}
langchain4j.open-ai.chat-model.base-url=https://api.deepseek.com/v1
langchain4j.open-ai.chat-model.model-name=deepseek-v4-flash
langchain4j.open-ai.chat-model.return-thinking=true
langchain4j.open-ai.chat-model.timeout=6s
langchain4j.open-ai.chat-model.log-requests=true
langchain4j.open-ai.chat-model.log-responses=true

# AI seats: LLM when DEEPSEEK_API_KEY is set; Mock fallback on timeout/parse/illegal (PRD §4.5.4)
werewolf.ai.enabled=${WEREWOLF_AI_ENABLED:true}
# P0.5: true = only wolves in NIGHT_WOLF use LLM; false = all acting seats use LLM
werewolf.ai.wolves-only=${WEREWOLF_AI_WOLVES_ONLY:false}
werewolf.ai.model-id=${WEREWOLF_AI_MODEL_ID:deepseek-v4-flash}
werewolf.ai.llm-timeout-seconds=${WEREWOLF_AI_LLM_TIMEOUT_SECONDS:6}
werewolf.ai.max-llm-retries=${WEREWOLF_AI_MAX_LLM_RETRIES:2}

# Seat Memory (ADR-004) — action_log projection into LLM user prompt
werewolf.ai.memory.enabled=true
werewolf.ai.memory.max-events=30
werewolf.ai.memory.max-chars=2000
werewolf.ai.memory.include-own-thinking=false
