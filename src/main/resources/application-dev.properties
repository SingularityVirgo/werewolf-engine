# Dev profile: docker compose up -d
# DEEPSEEK_API_KEY / SPRING_PROFILES_ACTIVE 从 Windows 环境变量读取（见 scripts/set-dev-env.ps1）

spring.datasource.url=jdbc:mysql://localhost:3306/werewolf?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=werewolf
spring.datasource.password=werewolf
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.data.redis.host=localhost
spring.data.redis.port=6379

# LangChain4j — DeepSeek 官方 OpenAI 兼容 API（dev/prod 同厂商同模型，不经千问/百炼）
# 模型：deepseek-v4-flash（低延迟）| 更强推理可改 deepseek-v4-pro
langchain4j.open-ai.chat-model.api-key=${DEEPSEEK_API_KEY:}
langchain4j.open-ai.chat-model.base-url=https://api.deepseek.com/v1
langchain4j.open-ai.chat-model.model-name=deepseek-v4-flash
langchain4j.open-ai.chat-model.return-thinking=true
langchain4j.open-ai.chat-model.timeout=15s
langchain4j.open-ai.chat-model.log-requests=true
langchain4j.open-ai.chat-model.log-responses=true

# AI seats: LLM when DEEPSEEK_API_KEY is set; Mock fallback on timeout/parse/illegal (PRD §4.5.4)
werewolf.ai.enabled=${WEREWOLF_AI_ENABLED:true}
# P0.5: true = only wolves in NIGHT_WOLF use LLM; false = all acting seats use LLM
werewolf.ai.wolves-only=${WEREWOLF_AI_WOLVES_ONLY:false}
werewolf.ai.model-id=${WEREWOLF_AI_MODEL_ID:deepseek-v4-flash}

# Seat Memory (ADR-004) — action_log projection into LLM user prompt
werewolf.ai.memory.enabled=true
werewolf.ai.memory.max-events=30
werewolf.ai.memory.max-chars=2000
werewolf.ai.memory.include-own-thinking=false
